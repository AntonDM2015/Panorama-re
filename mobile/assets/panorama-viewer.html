<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #panorama {
      width: 100%;
      height: 100%;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="panorama"></div>
  <div id="loading" class="loading">Загрузка панорамы...</div>
  
  <script>
    // Receive image URL from React Native
    document.addEventListener('message', function(event) {
      try {
        var data = JSON.parse(event.data);
        var imageUrl = data.imageSource;
        var hotspots = data.hotspots || [];
        
        // Hide loading indicator after image loads
        var viewer = pannellum.viewer('panorama', {
          type: 'equirectangular',
          panorama: imageUrl,
          autoLoad: true,
          showControls: false,
          showZoomCtrl: false,
          compass: false,
          hotSpots: hotspots.map(function(hs) {
            return {
              pitch: hs.pitch,
              yaw: hs.yaw,
              type: 'info',
              text: hs.text,
              clickHandlerFunc: function() {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                  type: 'hotspot_click',
                  hotspotId: hs.id
                }));
              }
            };
          })
        });
        
        viewer.on('load', function() {
          document.getElementById('loading').style.display = 'none';
          window.ReactNativeWebView.postMessage(JSON.stringify({
            type: 'loaded',
            success: true
          }));
        });
        
        viewer.on('error', function(error) {
          document.getElementById('loading').innerHTML = 'Ошибка загрузки: ' + error.message;
          window.ReactNativeWebView.postMessage(JSON.stringify({
            type: 'error',
            message: error.message
          }));
        });
        
      } catch (error) {
        document.getElementById('loading').innerHTML = 'Ошибка: ' + error.message;
      }
    });
  </script>
</body>
</html>
